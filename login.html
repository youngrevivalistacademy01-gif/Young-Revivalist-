<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Access Portal | YRA</title>
    <link rel="stylesheet" href="login.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <p class="est">EST. 2026</p>
            <h1>YOUNG<br>REVIVALIST<br><span class="outline">ACADEMY</span></h1>
        </header>

        <main class="login-card">
            <h2>ACCESS PORTAL</h2>
            <p class="tagline">Identify yourself, Revivalist.</p>

            <div class="input-container">
                <label>EMAIL ADDRESS</label>
                <input type="email" id="email-input" placeholder="revivalist@example.com">
            </div>

            <div class="input-container">
                <label>SECRET KEY (PASSWORD)</label>
                <input type="password" id="password-input" placeholder="••••••••">
            </div>

             <a href="dashboard.html" style="text-decoration: none;">
                <button id="login-btn">ENTER THE ACADEMY</button>
                </a>
               <p id="error-msg"></p>
            
            <div class="admin-gate">
                <a href="admin-login.html">ADMINISTRATOR ACCESS</a>
            </div>
        </main>
    </div>
    <script src="login.js"></script>
</body>
</html>
