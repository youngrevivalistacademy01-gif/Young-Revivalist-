<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YRA | Class Vault</title>
    <!-- Vector Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Clean, high-impact sans-serif typography matching the layout -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Link to our verified matching stylesheet -->
    <link rel="stylesheet" href="classes.css">
</head>
<body>

    <!-- Ambient background depth blurs for a premium feel -->
    <div class="vault-bg-glow glow-top"></div>
    <div class="vault-bg-glow glow-bottom"></div>

    <!-- 📱 APP FRAME WRAPPER -->
    <div class="app-container">
        
        <!-- HEADER MODULE -->
        <header class="header">
            <p class="sub-label">Academy Pathways</p>
            <h1 class="main-title">Growth Progression</h1>
        </header>

        <!-- HIGH-CONTRAST CARD TRACKS -->
        <main class="class-grid">
            
            <!-- UNLOCKED FOUNDATIONAL CLASS -->
            <a href="foundational-schedule.html" class="class-card unlocked">
                <div class="icon-box"><i class="fa-solid fa-seedling"></i></div>
                <div class="class-info">
                    <h3>FOUNDATIONAL CLASS</h3>
                </div>
                <div class="lock-status"><i class="fa-solid fa-unlock"></i></div>
            </a>

            <!-- LOCKED IDENTITY CLASS -->
            <div class="class-card locked" onclick="initVault('IDENTITY CLASS', '300500', 'identity-schedule.html')">
                <div class="icon-box"><i class="fa-solid fa-id-card"></i></div>
                <div class="class-info">
                    <h3>IDENTITY CLASS</h3>
                </div>
                <div class="lock-status"><i class="fa-solid fa-lock"></i></div>
            </div>

            <!-- LOCKED MATURITY CLASS -->
            <div class="class-card locked" onclick="initVault('MATURITY CLASS', '600301', 'maturity-schedule.html')">
                <div class="icon-box"><i class="fa-solid fa-id-card"></i></div>
                <div class="class-info">
                    <h3>MATURITY CLASS</h3>
                </div>
                <div class="lock-status"><i class="fa-solid fa-lock"></i></div>
            </div>

            <!-- LOCKED AMBASSADORS CLASS -->
            <div class="class-card locked" onclick="initVault('AMBASSADORS CLASS', '700500', 'ambassadors-schedule.html')">
                <div class="icon-box"><i class="fa-solid fa-crown"></i></div>
                <div class="class-info">
                    <h3>AMBASSADORS CLASS</h3>
                </div>
                <div class="lock-status"><i class="fa-solid fa-lock"></i></div>
            </div>

            <!-- 📑 NEW DIRECTIVE: DYNAMIC PDF DOCUMENT ACTION BAR -->
            <a href="pdf.html" class="pdf-download-bar">
                <div class="pdf-left">
                    <div class="pdf-icon-circle">
                        <i class="fa-solid fa-file-pdf"></i>
                    </div>
                    <div class="pdf-text-pack">
                        <span>Official Blueprint</span>
                        <h4>Download The Official YRA PDF</h4>
                    </div>
                </div>
                <div class="pdf-action-arrow">
                    <i class="fa-solid fa-arrow-down-to-line"></i>
                </div>
            </a>

        </main>
    </div>

    <!-- TRANSMISSION SECURITY VERIFICATION MODAL -->
    <div class="modal-overlay" id="vaultModal">
        <div class="modal-content">
            <div class="modal-handle"></div>
            <h2 id="modalTitle"></h2>
            <p class="modal-hint">Enter authorized passkey to proceed</p>
            
            <input type="tel" id="keyField" placeholder="••••••" maxlength="6" autocomplete="off">
            
            <button class="btn-verify" onclick="validateKey()">Unlock Pathway</button>
            <p id="errorNote">
                <i class="fa-solid fa-circle-exclamation"></i> Incorrect Passkey
            </p>
        </div>
    </div>

    <script>
        let currentPasskey = "";
        let targetDestination = "";

        const modal = document.getElementById('vaultModal');
        const keyInput = document.getElementById('keyField');
        const errorNote = document.getElementById('errorNote');

        function initVault(name, key, url) {
            currentPasskey = key;
            targetDestination = url;
            document.getElementById('modalTitle').innerText = name;
            errorNote.style.display = 'none';
            keyInput.style.borderColor = 'rgba(0, 0, 0, 0.06)';
            keyInput.value = "";
            modal.classList.add('active');
            keyInput.focus();
        }

        function validateKey() {
            if (keyInput.value === currentPasskey) {
                modal.classList.remove('active');
                window.location.href = targetDestination;
            } else {
                errorNote.style.display = 'flex';
                keyInput.style.borderColor = '#ff5454';
                // Haptic feedback simulation shake effect trigger ready
                keyInput.classList.add('shake-anim');
                setTimeout(() => { keyInput.classList.remove('shake-anim'); }, 400);
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) { 
                modal.classList.remove('active'); 
            }
        }
    </script>
</body>
</html>
