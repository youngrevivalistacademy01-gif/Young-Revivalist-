<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Revivalist Dashboard | YRA</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="logo">YRA</div>
            <div class="header-right">
                <a href="notification.html" class="noti-trigger">
                    <i class="far fa-bell"></i>
                    <span id="global-noti-dot" class="noti-badge" style="display: none;"></span>
                </a>
                <div class="status-indicator">
                    <span class="status-dot"></span> <span id="student-status">CONNECTING</span>
                </div>
            </div>
        </header>

        <section class="welcome-section">
            <h1 class="brand-text">The Spirit<br>& The Word</h1>
            <p class="greeting">Welcome back, <span id="student-name">Revivalist</span>.</p>
            <div class="id-badge">
                <span class="label">MATRIC NUMBER</span>
                <span id="matric-no">YRA / ---</span>
            </div>
        </section>

        <nav class="quick-nav">
            <a href="classes.html" class="nav-card">
                <div class="icon-box red-icon"><i class="far fa-calendar-alt"></i></div>
                <label>SCHEDULE</label>
            </a>
            <a href="rules.html" class="nav-card">
                <div class="icon-box blue-icon"><i class="far fa-bookmark"></i></div>
                <label>RULES</label>
            </a>
            <a href="quiz-portal.html" class="nav-card">
                <div class="icon-box purple-icon">
                    <i class="far fa-lightbulb"></i>
                    <span class="noti-dot" id="quiz-noti"></span>
                </div>
                <label>QUIZ</label>
            </a>
            <a href="assignment-dashboard.html" class="nav-card">
                <div class="icon-box dark-icon"><i class="fas fa-edit"></i></div>
                <label>ASSIGNMENT</label>
            </a>
        </nav>

        <section class="scripture-carousel" id="scripture-carousel">
            <div class="carousel-content">
                <blockquote id="scripture-text">“And he gave some, apostles; and some, prophets...”</blockquote>
                <p class="reference" id="scripture-ref">Ephesians 4:11-12</p>
            </div>
        </section>

        <section class="focus-section">
            <div class="module-content">
                <h3 id="cohort-display">FOUNDATIONAL COHORT</h3>
                <p id="focus-module-name">Module 1: The Gospel Class</p>
                <progress value="30" max="100" id="focus-progress"></progress>
            </div>
        </section>

        <a href="rhema-ai.html" class="rhema-ai-container">
            <div class="rhema-msg-bubble">
                Hii I'm YRA AI, ready to help if you are confused.
            </div>
            <div class="rhema-robot-icon">
                <div class="robot-head">
                    <div class="robot-eyes">
                        <span></span>
                        <span></span>
                    </div>
                </div>
                <div class="robot-glow"></div>
            </div>
        </a>

        <footer class="bottom-nav">
            <div class="nav-item active"><a href="#"><i class="fas fa-home"></i></a></div>
            <div class="nav-item"><a href="classes.html"><i class="fas fa-book"></i></a></div>
            <div class="nav-item" id="logout-trigger"><i class="fas fa-sign-out-alt"></i></div>
        </footer>
    </div>
    <script src="dashboard.js"></script>
</body>
</html>
