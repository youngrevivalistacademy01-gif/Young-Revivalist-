<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YRA | Portal Assignment Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assignment.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <a href="javascript:history.back()" class="back-control" aria-label="Navigate back">
                <i class="fa-solid fa-chevron-left"></i>
            </a>
            <div class="app-brand">ASSIGNMENT PORTAL</div>
        </header>

        <main class="portal-card">
            <span class="module-tag" id="target-index">Loading Track...</span>
            <h1 class="module-title" id="target-title">Processing Curriculum Context...</h1>

            <section class="matric-workspace-block">
                <label class="matric-label" for="matric-digits">Student Matric Number</label>
                <div class="matric-input-composite-group">
                    <div class="matric-prefix-lock">YRA /</div>
                    <input 
                        type="text" 
                        id="matric-digits" 
                        class="matric-editable-field" 
                        placeholder="e.g. 11" 
                        required
                        pattern="[0-9]+"
                        inputmode="numeric"
                    >
                </div>
            </section>

            <div class="instructions-box">
                <h3>Instructions</h3>
                <p>Provide thoughtful, clear, and comprehensive answers based directly on the lecture modules and structural growth studies.</p>
            </div>

            <form id="assignment-form">
                <div id="dynamic-questions-container"></div>

                <button type="submit" class="submission-btn">
                    <i class="fa-brand fa-whatsapp"></i>
                    <span>Submit</span>
                </button>
            </form>
        </main>
        <script src="assignment.js"></script>
    </div>

</body>
</html>
